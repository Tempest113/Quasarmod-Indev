l_simp_chinese:
  
  # This file, as the name would imply, handles the loc for events specifically
  
  ###########################################
  ### Megastructure Stage Complete Events ###
  ###########################################
  
  # Gargantuan Matrioshka Brain
  quasarmod_megastage_dialogue.1.name:0 "Gargantuan Matrioshka Brain Construction"
  quasarmod_megastage_dialogue.1.desc:0 "We are now ready to begin the colossal task of constructing a Gargantuan Matrioshka Brain. The first step will be the construction of the hawking capacitors around the black hole, which will increase the rate at which hawking radiation is emitted. As each layer is added, more and more research will be generated. Keep in mind that the efficiency of the Gargantuan Matrioshka Brain will skyrocket once we finish the last layer. The planetary bodies of the system will be dismantled in order to make room for the terastructure."
  quasarmod_megastage_dialogue.1.a:0 "Wonderful."
  
  quasarmod_megastage_dialogue.2.name:0 "Gargantuan Matrioshka Brain - Hawking Capacitors Built"
  quasarmod_megastage_dialogue.2.desc:0 "The hawking capacitors and Chrono-Accelerators are now in place around [giga_planet.GetName], and are actively collecting energy. We shall now construct the first computing layer, the main databank. It will serve as a huge storage unit constantly gathering and analyzing new data from all four corners of the galaxy."
  quasarmod_megastage_dialogue.2.a:0 "Excellent."
  
  quasarmod_megastage_dialogue.3.name:0 "Gargantuan Matrioshka Brain - Main Databank Built"
  quasarmod_megastage_dialogue.3.desc:0 "The main databank has been constructed, and is already vastly improving our research efforts. However, its abilities are still very restricted and more layers are required to reach peak efficiency. We may now begin the construction of the central processor, which will house the most powerful computers in the galaxy, powered by the heat emitted by the main databank."
  quasarmod_megastage_dialogue.3.a:0 "Good. We are getting there."
  
  quasarmod_megastage_dialogue.4.name:0 "Gargantuan Matrioshka Brain - Central Processor Built"
  quasarmod_megastage_dialogue.4.desc:0 "The central processor is finished. It is a gigantic network of sentient computers linked together like a gigantic neural net, possessing incredible computing power. It uses the heat from the main databank to function, and also treats the data collected by said databank. The next layer will consist of the quantum calculators, which will work alongside the central processor to understand the mysteries of the universe."
  quasarmod_megastage_dialogue.4.a:0 "Another step towards a glorious future."
  
  quasarmod_megastage_dialogue.5.name:0 "Gargantuan Matrioshka Brain - Quantum Calculators Built"
  quasarmod_megastage_dialogue.5.desc:0 "The quantum calculators are up and running. These two gigantic rings use the thermal energy generated by the central processor, and they are actively working to find the answers to the most complicated questions in every field of science. The last step in constructing the Gargantuan Matrioshka Brain will be to build the Cross-referential archive, which will be a huge network of computers linking every single computer of the Gargantuan Matrioshka Brain together in an organized fashion, boosting its efficiency immensely."
  quasarmod_megastage_dialogue.5.a:0 "Another step towards a glorious future."
  
  quasarmod_megastage_dialogue.6.name:0 "Gargantuan Matrioshka Brain Finished"
  quasarmod_megastage_dialogue.6.desc:0 "Today is a glorious day for our empire. Our most skilled engineers and workers have constructed technological marvel only the greatest empires could ever dream of. This Gargantuan Matrioshka Brain, equipped with the most powerful computers ever designed in this galaxy, shall help us uncover the last mysteries of the universe."
  quasarmod_megastage_dialogue.6.a:0 "Wonderful."
  
  # Supermassive Black Hole Manipulator
  quasarmod_megastage_dialogue.101.name:0 "S.M.B.H Manipulator Construction"
  quasarmod_megastage_dialogue.101.desc:0 "With the construction site complete, we stand ready to begin the task of constructing a S.M.B.H Manipulator in [giga_system.GetName]. Upon this scaffold, we shall construct a massive frame on which the remainder of the structure will rest, completely encircling the black hole below.\n\nSoon, the very heart of the galaxy will bend to our will."
  quasarmod_megastage_dialogue.101.a:0 "Wonderful."
  
  quasarmod_megastage_dialogue.102.name:0 "S.M.B.H Manipulator Supports Built"
  quasarmod_megastage_dialogue.102.desc:0 "We have finalized the construction of the pentadimensional supports for our S.M.B.H Manipulator in the [giga_system.GetName] system. With this, the supporting structure is complete and we can now move on to constructing the $smbh_manipulator_3$."
  quasarmod_megastage_dialogue.102.a:0 "Excellent."
  
  quasarmod_megastage_dialogue.103.name:0 "S.M.B.H Manipulator Magnetic Confinement Built"
  quasarmod_megastage_dialogue.103.desc:0 "The installation of the Magnetic Confinement rings around [giga_planet.GetName] marks a critical milestone in the construction of our S.M.B.H Manipulator. Designed to contain the accretion disk and relativistic jets of a Hyperquasar, these rings play a vital supporting role in the greater structure."
  quasarmod_megastage_dialogue.103.a:0 "Marvelous."
  
  quasarmod_megastage_dialogue.104.name:0 "S.M.B.H Manipulator Plasma Redirection Array Built"
  quasarmod_megastage_dialogue.104.desc:0 "Construction of the plasma redirection array for the S.M.B.H Manipulator in the [giga_system.GetName] system has been finalized, gargantuan plasma pumps and harvesters capable of processing entire stars worth of mass in only a matter of months now sit idly above the black hole below, waiting for us to complete the rest of the structure. All that remains now is the construction of the Plasma Redirection Array and custom radiation shielding."
  quasarmod_megastage_dialogue.104.a:0 "Good, we are almost there.."
  
  quasarmod_megastage_dialogue.105.name:0 "S.M.B.H Manipulator Complete"
  quasarmod_megastage_dialogue.105.desc:0 "At long last, our S.M.B.H Manipulator in the [giga_system.GetName] system is complete! We now possess the capability to transform [giga_planet.GetName] into an [QuasarmodGetCoreOpposite], all we must do now is give the go-ahead to begin."
  quasarmod_megastage_dialogue.105.a:0 "Perfect."
  
  
  # Hyperquasaric Teraforge
  quasarmod_megastage_dialogue.201.name:0 "Hyperquasaric Teraforge Construction"
  quasarmod_megastage_dialogue.201.desc:0 "With the completion of the construction site in the [giga_system.GetName] system, we are now ready to begin the colossal undertaking that is the construction of a Hyperquasaric Teraforge, perhaps the largest shipyard and source of military grade alloys in our corner of the universe."
  quasarmod_megastage_dialogue.201.a:0 "Excellent."
  
  quasarmod_megastage_dialogue.202.name:0 "Teraforge Inner Ring Built"
  quasarmod_megastage_dialogue.202.desc:0 "The second stage of the Hyperquasaric Teraforge, the inner ring, has been completed without issues and the structure is now generating a magnetic field large enough and powerful enough that the accretion disk of the quasar has shrunk considerably, protecting the future stages of the terastructure from the immense heat and radiation that they would otherwise be subjected to."
  quasarmod_megastage_dialogue.202.a:0 "Wonderful."
  
  quasarmod_megastage_dialogue.203.name:0 "Teraforge Mass Collectors Built"
  quasarmod_megastage_dialogue.203.desc:0 "The Hyperquasaric Teraforge Mass Collectors have been constructed successfully. They are currently operating at a reduced capacity, as more of the structure is completed and more alloy processing overhead is made available, the harvesters will increase the rate at which matter is collected, and in turn the rate at which we can produce alloys will also increase."
  quasarmod_megastage_dialogue.203.a:0 "Great."
  
  quasarmod_megastage_dialogue.204.name:0 "Teraforge Alloy Processing Built"
  quasarmod_megastage_dialogue.204.desc:0 "The construction of the penultimate of the Hyperquasaric Teraforge has come to a conclusion. The colossal alloy processors, capable of refining an entire planets worth of mass in a matter of days are already refining huge amounts of minerals into a yet unseen amount of alloys."
  quasarmod_megastage_dialogue.204.a:0 "We are so close."
  
  quasarmod_megastage_dialogue.205.name:0 "Hyperquasaric Teraforge Complete"
  quasarmod_megastage_dialogue.205.desc:0 "The Hyperquasaric Teraforge in the [giga_system.GetName] system has been activated and is now harvesting the accretion disk and refining its resources into an unprecedented amount of alloys. But what will we use these alloys for? Ships? Megastructures? It does not matter, for our resources are now effectively bottomless."
  quasarmod_megastage_dialogue.205.a:0 "Let us begin."
  
  # Hyperquasaric Megashipyard
  quasarmod_megastage_dialogue.301.name:0 "Hyperquasaric Megashipyard Construction"
  quasarmod_megastage_dialogue.301.desc:0 "The Hyperquasaric Megashipyard Construction Site in the [giga_system.GetName] system is complete. We will soon be cement ourselves as the owners of the most powerful navy in galactic history, surpassing even the empires of old."
  quasarmod_megastage_dialogue.301.a:0 "Understood."
  
  quasarmod_megastage_dialogue.302.name:0 "Hyperquasaric Megashipyard Accretion Harvester Built"
  quasarmod_megastage_dialogue.302.desc:0 "We have successfully constructed the Accretion Harvester stage of the Hyperquasaric Megashipyard in the [giga_system.GetName] system. We should move swiftly on to the next stage."
  quasarmod_megastage_dialogue.302.a:0 "Moving on."
  
  quasarmod_megastage_dialogue.303.name:0 "Hyperquasaric Megashipyard Purification Ring Built"
  quasarmod_megastage_dialogue.303.desc:0 "We have finished the construction of the Hyperquasaric Megashipyard Purification Ring in the [giga_system.GetName] system. We are now more than half way towards having a completed Hyperquasaric Megashipyard."
  quasarmod_megastage_dialogue.303.a:0 "Great."
  
  quasarmod_megastage_dialogue.304.name:0 "Hyperquasaric Megashipyard Distribution Ring Built"
  quasarmod_megastage_dialogue.304.desc:0 "The Hyperquasaric Megashipyard Distribution Ring in the [giga_system.GetName] system has been finished, now that we have the means of handling such a vast amount of materials, we can move on to building the actual shipyards and naval logistics/storage ringZ."
  quasarmod_megastage_dialogue.304.a:0 "We are so close."
  
  quasarmod_megastage_dialogue.305.name:0 "Hyperquasaric Megashipyard Complete"
  quasarmod_megastage_dialogue.305.desc:0 "The Hyperquasaric Megashipyard in the [giga_system.GetName] system is complete! We now possess the ability to create an armada so large that we will not only blot out the stars, but the galaxy itself."
  quasarmod_megastage_dialogue.305.a:0 "It is beautiful."
  
  # Gargantuan Quasarcraft
  quasarmod_megastage_dialogue.401.name:0 "$quasarmod_quasarcraft$ Construction"
  quasarmod_megastage_dialogue.401.desc:0 "The construction site of the $quasarmod_quasarcraft$ is complete. Soon, [giga_planet.GetName] will be transformed into the greatest warship to ever grace our galaxy. The [this.GetName] will rule alongside those who wish to call us friend and reign above those who wish to call us foe."
  quasarmod_megastage_dialogue.401.a:0 "Our might shall silence all that oppose us."
  
  quasarmod_megastage_dialogue.402.name:0 "$quasarcraft_1$ Built"
  quasarmod_megastage_dialogue.402.desc:0 "Our $quasarmod_quasarcraft$'s Superstructure has been completed. This frame hosts some of the future warships most vital subsystems, ranging from targeting computers to the hardware used to contain the Quasar residing in the ships center."
  quasarmod_megastage_dialogue.402.a:0 "The power of a Quasar in the palms of our hands..."
  
  quasarmod_megastage_dialogue.403.name:0 "$quasarcraft_2$ Built"
  quasarmod_megastage_dialogue.403.desc:0 "Our $quasarmod_quasarcraft$s polar-equatorial halo is complete. Serving as both an anchor point for future weapons installations and a home for many of the systems keeping the Quasarcraft stable, this massive construct dwarfs even the largest traditional stellar-scale megastructures."
  quasarmod_megastage_dialogue.403.a:0 "Perfect."
  
  quasarmod_megastage_dialogue.404.name:0 "$quasarcraft_3$ Built"
  quasarmod_megastage_dialogue.404.desc:0 "Our $quasarmod_quasarcraft$'s main weapons are now finished! The colossal weapons mounted to both the Halo and bow are capable of unleashing a never-before-seen display of force upon any target unlucky enough to cross its path. Only one step remains now, and it will require gathering 6000 pops through a decision from any of our worlds in order to serve as the crew.\n\n§YThis decision will not destroy or uncolonize the planet it is used on§!\n\n§RWARNING: Ensure that you have a valid ship design for the Quasarcraft before constructing the next stage, if you have no design for the ship when the mega is complete, the Quasarcraft will fail to spawn.§!"
  quasarmod_megastage_dialogue.404.a:0 "We are so close."
  
  quasarmod_megastage_dialogue.405.name:0 "$quasarmod_quasarcraft$ Complete"
  quasarmod_megastage_dialogue.405.desc:0 "At last. It is done. With the last of the vessel's dozens of billions of inhabitants finally moved in, and the finalization of the ships life support systems, the $quasarmod_quasarcraft$ has been completed.\n\nThis vessel of previously unheard of scale dwarfs anything and everything built before it, fielding such immense firepower that only another Quasarcraft could even hope to breach its shields. Its thrusters have been powered on, and the gigantic vessel is now awaiting orders.\n\nNothing can oppose our might now."
  quasarmod_megastage_dialogue.405.a:0 "It is beautiful."
  
  quasarmod_megastage_dialogue.406.name:0 "Quasarcraft Crew Acquired"
  quasarmod_megastage_dialogue.406.desc:0 "We have now designated several billion individuals to serve as the crew for the $quasarmod_quasarcraft$. We may now begin the colossal task of upgrading the Quasarcraft to its completed form, as well as relocating its crew to the vessel itself."
  quasarmod_megastage_dialogue.406.a:0 "Acknowledged."
  
  
  # Quasarcraft Destroyed
  qsc_destroyed.1.name:0 "Hope's End"
  qsc_destroyed.1.desc:0 "The impossible has happened; our $quasarmod_quasarcraft$, the sword and shield of the empire has been destroyed in the [event_target:qsc_destroyed_here.System.GetName] system.\n\nThe resulting damage following the ships destruction was catastrophic, [event_target:qsc_destroyed_here.GetName] as well as the Quasarcraft itself have been completely consumed by the $pc_core_quasar$ that once powered the ship.\n\nSystems adjacent to [event_target:qsc_destroyed_here.GetName] have been utterly destroyed by the subspace backlash following the Quasarcrafts destruction. Even systems beyond those adjacent to [event_target:qsc_destroyed_here.GetName] have been impacted, such a disaster caused by one of our own ships is surely going to hurt our diplomatic standing with those effected by the damage.\n\nAll we can do now is hope that our remaining forces will be enough to fend off the coming threat."
  qsc_destroyed.1.a:0 "What do we do now?"
  
  qsc_destroyed.2.name:0 "Quasarcraft Self Destructed!"
  qsc_destroyed.2.desc:0 "Our Quasarcraft in the [event_target:quasarcraft_using_endsinger.System.GetName] system has undergone a catastrophic failure event after being ordered to self destruct, taking [event_target:quasarcraft_using_endsinger.System.GetName] and surrounding systems with it.\n\nThe largest weapon to ever grace our galaxy, the flagship of our empire has been destroyed by our own volition."
  qsc_destroyed.2.a:0 "This had better be worth it..."
  
  # Endsinger Event Loc
  qsc_endsinger.1.title:0 "§MThe Endsinger's Quasaric Melody§!"
  qsc_endsinger.1.desc:0 "You have used the Endsinger to mark a planet and its system for potential expulsion. To do so, pick from one of the following options.\n\n$qsc_endsinger.2$ will not only obliterate the targeted system, but any systems directly connected to it.\n\n$qsc_endsinger.3$ will destroy the system that the Endsinger was fired upon, without requiring the star itself to have been picked initially.\n\n$qsc_endsinger.4$ will simply completely expunge the body the Endsinger was targeting from existence, a most precise application of our ultimate war machine.\n\n$qsc_endsinger.6$ will split the output of our majestic Quasar into several wormholes, however it will cause the main Quasarcraft's weaponry to be much less effective for this time.\n\n$qsc_self_destruct.1$ will have the Quasarcraft disable all systems that are actively compressing the $pc_core_quasar$, allowing it to rapidly expand, destroying the ship and nearby systems.\n\n§RWARNING: Under certain conditions, the $qsc_endsinger.2$ targeting mode may cause bugs and/or crashes.§!"
  qsc_endsinger.2:0 "§MStar Cluster§!"
  qsc_endsinger.3:0 "§YSolar System§!"
  qsc_endsinger.4:0 "§EPlanet§!"
  qsc_endsinger.5:0 "§HCancel§!"
  qsc_endsinger.6:0 "§BMulti-Instance Fire Support§!"
  qsc_endsinger.7:0 "§GPower Level Control Panel§!"
  qsc_endsinger.8:0 "§HExit§!"
  qsc_endsinger.400.title:0 "§BMulti-Instance Fire Support§!"
  qsc_endsinger.400.desc:0 "You have selected the $qsc_endsinger.400.title$ feature. This will split the output of the hyperweapon through several wormholes that may be positioned as you choose. Although the power of the §YQuasaric EHOF§! means these wormholes have no expiry, this also means that the Quasarcraft will be severely hampered in terms of firepower for the time being. You may use this selection screen to confirm or dispel existing wormholes."
  qsc_endsinger.401:0 "§BConfirm M.I.F.S.§!"
  qsc_endsinger.402:0 "§RDispel Existing Wormholes§!"
  qsc_endsinger.403:0 "§HReturn to Scale Selection§!"
  
  # Quasarcraft Self Destruction
  qsc_self_destruct.1:0 "§RInitiate Self Destruct§!"
  qsc_self_destruct.1.desc:0 "You have selected the $qsc_self_destruct.1$ feature. This will have the Quasarcraft disable all systems that are actively compressing the $pc_core_quasar$, allowing it to rapidly expand.\n\nThis will result in the immediate destruction of the ship and system it resides in, the complete erasure of adjacent systems and heavy damage to systems 2-3 jumps away from the point of detonation.\n\nThe subspace backlash of the detonation will also cause significant damage to nearby hyperlanes, resulting in them being rearranged or destroyed."
  
  qsc_self_destruct.2:0 "§RInitiate Quasarcraft Self Destruction§!"
  qsc_self_destruct.2.desc:0 "The Quasarcraft in the [event_target:quasarcraft_using_endsinger.System.GetName] system will initiate a self destruct sequence with immediate effect, allowing the $pc_core_quasar$ at its core to consume the ship and surrounding system, as well as dealing massive damage to nearby systems and hyperlanes."
  
  qsc_endsinger.500.title:0 "§GPower Level Control Panel§!"
  qsc_endsinger.500.desc:0 "This menu allows you to change the power level of the §MEndsinger,§! changing what it does to systems and planets it is fired upon.\n\nOn §YNormal§! power mode, the §MEndsinger§! will entirely annihilate planets and systems it is fired against, turning them into empty space and dust. If such devastation is not your intention, the next entry is for you.\n\nOn §PLow-Power§! mode, the §MEndsinger§! will put far less power into it's destructive wrath, shattering planets instead of utterly obliterating them. Not only that, but the star and hyperlanes will be preserved, allowing for future operations such as using the G.L.U.E."
  qsc_endsinger.500.lowpower:0 "§HCurrent Mode:§! §PLow-Power§!"
  qsc_endsinger.500.normalpower:0 "§HCurrent Mode:§! §YNormal Power§!"
  qsc_endsinger.500.increase:0 "§HIncrease Power Output§!"
  qsc_endsinger.500.decrease:0 "§HDecrease Power Output§!"
  qsc_already_normal:0 "The §MEndsinger§! is already on its normal setting!"
  qsc_already_low:0 "The §MEndsinger§! is already on low power mode!"
  
  ###########################
  # General Dialogue Events #
  ###########################
  
  # Black Hole Injector Complete
  quasarmod_dialogue.1.name:0 "Mass Injector: Online"
  quasarmod_dialogue.1.desc:0 "After many years of construction, we have completed and activated the S.M.B.H Manipulator and we are now injecting incredible amounts of stellar plasma into [target.GetName] \n\nIt will only be a matter of time before an accretion disk begins to form around the equator."
  quasarmod_dialogue.1.a:0 "Hopefully we have enough stellar plasma to keep up..."
  
  # Injection Complete Notification
  quasarmod_dialogue.102.name:0 "Injection Complete"
  quasarmod_dialogue.102.desc:0 "After several years of stellar plasma injection we have massively increased the mass of [root.from.GetName]. Burning with a brightness more intense than every star in the galaxy combined, the newly formed accretion disk stands as a testament to [root.species.GetName] engineering.\n\nThe S.M.B.H Manipulator can now dismantled and recycled for any usable materials."
  quasarmod_dialogue.102.a:0 "Perfect."
  
  # Black Hole Harvester Complete
  quasarmod_dialogue.2.name:0 "Mass Harvester: Online"
  quasarmod_dialogue.2.desc:0 "After many years of construction, we have completed and activated the S.M.B.H Manipulator and we are now harvesting incredible amounts of stellar plasma from [target.GetName] \n \nIt will only be a matter of time before the violence and immense heat of the accretion disk surrounding the quasar is little more than a faded memory."
  quasarmod_dialogue.2.a:0 "I wonder how many O-Class stars we could create with all this stellar plasma..."
  
  # Harvesting Complete Notification
  quasarmod_dialogue.202.name:0 "Harvesting Complete"
  quasarmod_dialogue.202.desc:0 "After several years of constant harvesting we have successfully managed to completely deplete the accretion disk of [root.from.GetName], a feat which has never been achieved before. It can now be now considered safe for us to begin work on other projects around the now \"dead\" black hole.\n\nThe S.M.B.H Manipulator can now dismantled and recycled for any usable materials.\n \n§RNOTE TO PLAYER: If the system icon does not change from the quasar icon to the inactive icon, run the \"reload_graphical_map\" command, or save and reload your game.§!"
  quasarmod_dialogue.202.a:0 "Perfect."
  
  # The destruction of Aiondia
  quasarmod_dialogue.3.name:0 "The Destruction of Aiondia"
  quasarmod_dialogue.3.desc:0 "After quite possibly one of the most devastating wars in galactic history, §YAiondia§! has fallen to the §Y[aeternite_conqueror.GetName]§!.\n\nFollowing a horrifying demonstration of their flagship $quasarmod_quasarcraft$s offensive capabilities, the §Y[aeternite_conqueror.GetName]§! has utterly annihilated the Aeternite defenders who, despite their incredible technologies, were not able to withstand the power of their quasar powered hyperweapon.\n\nWith the loss of their one and only permanent settlement, the Aeternites can no longer sustain their war effort, and whatever remains of their empire will soon disappear."
  quasarmod_dialogue.3.a:0 "Another precursor empire bites the dust."
  
  # SMBH Manipulator Dismantled
  quasarmod_dialogue.5.name:0 "S.M.B.H Manipulator Dismantled"
  quasarmod_dialogue.5.desc:0 "We have finished dismantling our S.M.B.H Manipulator in the [quasarmod_smbh_manipulator_dismantling.System.GetName] system, it has served its purpose well but it is time for us to move on to bigger things."
  quasarmod_dialogue.5.a:0 "Excellent."
  