  job_teraforge_overseer_alloys_gestalt_effect_desc:0 "[teraforge_overseer_alloys_gestalt.GetIcon] [teraforge_overseer_alloys_gestalt.GetNamePlural] turn £trade£ §Y$trade$§! into £mod_pop_bonus_workforce_mult£ §Y$mod_pop_fabricator_bonus_workforce_mult$§!"
  mod_job_teraforge_overseer_alloys_gestalt_add:0 "[teraforge_overseer_alloys_gestalt.GetName] Jobs"
  
  # Alloys - Gestalt - Catalytic #
  job_teraforge_overseer_alloys_catalytic_gestalt:0 "Teraforge Catalytic Integration Overseer Drone"
  job_teraforge_overseer_alloys_catalytic_gestalt_plural:0 "Teraforge Catalytic Integration Overseers Drones"
  job_teraforge_overseer_alloys_catalytic_gestalt_plural_with_icon:0 "[teraforge_overseer_alloys_catalytic_gestalt.GetIcon] [teraforge_overseer_alloys_catalytic_gestalt.GetNamePlural]"
  job_teraforge_overseer_alloys_catalytic_gestalt_desc:0 "Specialist drones responsible for the integration of Teraforge-derived organic alloy precursors into planetary foundries, ensuring production lines operate at peak efficiency."
  job_teraforge_overseer_alloys_catalytic_gestalt_effect_desc:0 "[teraforge_overseer_alloys_catalytic_gestalt.GetIcon] [teraforge_overseer_alloys_catalytic_gestalt.GetNamePlural] turn £trade£ §Y$trade$§! into £mod_pop_bonus_workforce_mult£ §Y$mod_pop_foundry_bonus_workforce_mult$§!"
  mod_job_teraforge_overseer_alloys_catalytic_gestalt_add:0 "[teraforge_overseer_alloys_catalytic_gestalt.GetName] Jobs"
  
  # Consumer Goods - Regular #
  job_teraforge_overseer_consumer_goods:0 "Teraforge Civilian Integration Overseer"
  job_teraforge_overseer_consumer_goods_plural:0 "Teraforge Civilian Integration Overseers"
  job_teraforge_overseer_consumer_goods_plural_with_icon:0 "[teraforge_overseer_consumer_goods.GetIcon] [teraforge_overseer_consumer_goods.GetNamePlural]"
  job_teraforge_overseer_consumer_goods_desc:0 "Highly trained specialists who oversee the application of Teraforge-derived material standards within civilian manufacturing, allowing our [artisan.GetNamePlural] to maintain high output with minimal waste by reducing tooling complexity and simplifying production lines."
  job_teraforge_overseer_consumer_goods_effect_desc:0 "[teraforge_overseer_consumer_goods.GetIcon] [teraforge_overseer_consumer_goods.GetNamePlural] turn £trade£ §Y$trade$§! into £mod_pop_bonus_workforce_mult£ §Y$mod_pop_artisan_bonus_workforce_mult$§!"
  mod_job_teraforge_overseer_consumer_goods_add:0 "[teraforge_overseer_consumer_goods.GetName] Jobs"
  
