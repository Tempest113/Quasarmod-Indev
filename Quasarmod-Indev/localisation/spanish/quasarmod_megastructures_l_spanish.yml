  job_teraforge_overseer_consumer_goods_gestalt:0 "Teraforge Civilian Integration Overseer Drone"
  job_teraforge_overseer_consumer_goods_gestalt_plural:0 "Teraforge Civilian Integration Overseer Drones"
  job_teraforge_overseer_consumer_goods_gestalt_plural_with_icon:0 "[teraforge_overseer_consumer_goods_gestalt.GetIcon] [teraforge_overseer_consumer_goods_gestalt.GetNamePlural]"
  job_teraforge_overseer_consumer_goods_gestalt_desc:0 "Specialist drones who oversee the application of Teraforge-derived material standards within civilian manufacturing, allowing our [artisan_drone.GetNamePlural] to maintain high output with minimal waste by reducing tooling complexity and simplifying production lines."
  job_teraforge_overseer_consumer_goods_gestalt_effect_desc:0 "[teraforge_overseer_consumer_goods_gestalt.GetIcon] [teraforge_overseer_consumer_goods_gestalt.GetNamePlural] turn £trade£ §Y$trade$§! into £mod_pop_bonus_workforce_mult£ §Y$mod_pop_artisan_drone_bonus_workforce_mult$§!"
  mod_job_teraforge_overseer_consumer_goods_gestalt_add:0 "[teraforge_overseer_consumer_goods_gestalt.GetName] Jobs"
  
  
  #######################################
  # Supermassive Black Hole Manipulator #
  #######################################
  
  smbh_manipulator_0:0 "$gc_tera$S.M.B.H Manipulator Site"
  smbh_manipulator_0_DESC:0 "This construction site will act as the staging ground for one of our most recent and largest stellar manipulation projects, the Supermassive Black Hole Manipulator."
  smbh_manipulator_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_terastructure$ - $giga_list_category_miscellaneous$ \nCan change the type of supermassive black hole in the galactic core by harvesting or injecting £sr_stellar_plasma£ §Y$sr_stellar_plasma$§!"
  
  smbh_manipulator_1:0 "S.M.B.H Manipulator Pentadimensional Supports"
  smbh_manipulator_1_DESC:0 "This support frame extends into five dimensional space, providing reinforcement against the stresses inherent to a structure of its size. Without them, the S.M.B.H Manipulator would collapse under its own mass, greatly outclassing that of entire stars."
  
  smbh_manipulator_2:0 "S.M.B.H Manipulator Magnetic Confinement"
  smbh_manipulator_2_DESC:0 "A vast array of magnetic field generator rings encircles the supermassive black hole below, containing its accretion disk and relativistic jets to allow safer manipulation of the black holes composition."
  
  smbh_manipulator_3:0 "S.M.B.H Manipulator Plasma Redirection Array"
  smbh_manipulator_3_DESC:0 "The plasma redirection array is the main focus of the entire megastructure, allowing us to feed the black hole below with incredible amounts of stellar plasma. We also have the ability to do the exact opposite, harvesting the hyperquasar's accretion disk and slowing its rotation, as well as capturing energy from its relativistic jets, effectively killing the active core, although this does not mean that we will be unable to revive it..."
  
  smbh_manipulator_4:0 "Inactive S.M.B.H Manipulator"
  smbh_manipulator_4_DESC:0 "A complete yet inactive S.M.B.H Manipulator, ready to reshape the very heart of the galaxy to our needs. All that remains is to give the go ahead."
  
  smbh_manipulator_a5:0 "S.M.B.H Manipulator - Mass Injection"
  smbh_manipulator_a5_DESC:0 "We have begun injecting £sr_stellar_plasma£§Y$sr_stellar_plasma$§! into the inactive core in order to transform it to better suit our needs as an §MActive Hyperquasar§!."
  
  smbh_manipulator_b5:0 "S.M.B.H Manipulator - Mass Harvesting"
  smbh_manipulator_b5_DESC:0 "We have begun harvesting incredible amounts of £sr_stellar_plasma£§Y$sr_stellar_plasma$§! from the hyperquasar's accretion disk, it will soon fit our needs as an §MInactive Supermassive Black Hole§!."
  
  
  
  ###############################
  # Gargantuan Matrioshka Brain #
  ###############################
  
  matrioshka_brain_0_core:0 "$gc_tera$Gargantuan Matrioshka Brain Site"
  matrioshka_brain_0_core_DESC:0 "This construction site will serve as a staging depot to host the large amounts of resources and personnel needed to construct a Gargantuan Matrioshka Brain."
  matrioshka_brain_0_core_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_terastructure$ - $giga_list_category_science_production$ \nHarvests a §YSupermassive Black Hole§!'s energy to power the largest computing complex in the galaxy, producing £physics_research£ £society_research£ £engineering_research£ §YResearch§! - $giga_list_removes_system_planets$"
  
  matrioshka_brain_1_core:0 "Gargantuan Matrioshka Brain Hawking Capacitors"
  matrioshka_brain_1_core_DESC:0 "Employing similar technology to the $name_hraemc$, albeit on a much larger scale, this array of Capacitors and Chrono-Accelerators accelerate the emission of hawking radiation from the black hole below, collecting and storing energy for later use."
  
  matrioshka_brain_2_core:0 "Gargantuan Matrioshka Brain Main Databank"
  matrioshka_brain_2_core_DESC:0 "The main databanks are now in place around the black hole, and top-of-the-line computers have been installed to manage the raw amount of data generated by scientific research. Most of the data we've gathered so far has been stored and is currently being studied here."
  
  matrioshka_brain_3_core:0 "Gargantuan Matrioshka Brain Central Processor"
  matrioshka_brain_3_core_DESC:0 "The central processors are huge computers stretching around the entire black hole, reaching almost a hundred AU in diameter. The heat generated from the main databanks is used to power the central processors, greatly increasing the efficiency of the device. These computers are extremely powerful."
  
  matrioshka_brain_4_core:0 "Gargantuan Matrioshka Brain Quantum Calculators"
  matrioshka_brain_4_core_DESC:0 "Complex calculations pertaining to the very nature of the universe are being processed in these quantum calculators. They use the heat from the central processor to function, making them incredibly efficient."
  
  matrioshka_brain_5_core:0 "Gargantuan Matrioshka Brain"
  matrioshka_brain_5_core_DESC:0 "A fully operational Gargantuan Matrioshka Brain, including the outermost layer consisting of the cross-referential archives which coordinate the other components, boosting efficiency to its maximum."
  
  decision_quasarmod_establish_core_mbrain_uplink:0 "Establish $matrioshka_brain_5_core$ Uplink"
  decision_quasarmod_establish_core_mbrain_uplink_desc:0 "Establish a connection to our §Y$matrioshka_brain_5_core$§! in the galactic core, massively increasing the potency of all $building_giga_matrioshka_brain_uplink$ buildings on the planet."
  
  decision_quasarmod_sever_core_mbrain_uplink:0 "Sever $matrioshka_brain_5_core$ Uplink"
  decision_quasarmod_sever_core_mbrain_uplink_desc:0 "Sever this planets connection to our $matrioshka_brain_5_core$."
  
  quasarmod_connected_to_core_mbrain_mod:0 "Gargantuan Matrioshka Brain Uplink"
  quasarmod_connected_to_core_mbrain_mod_desc:0 "This planet is connected to a $matrioshka_brain_5_core$ via advanced tachyon relays, this increase in available processing power results in a massive increase in potency for our $building_giga_matrioshka_brain_uplink$ buildings."
  mod_planet_giga_matrioshka_brain_uplinks_energy_upkeep_mult:0 "Matrioshka Brain Uplink Energy Credits Upkeep"
  
  
  
  ##############################
  # Hyperquasaric Megashipyard #
  ##############################
  
  hyperquasaric_megashipyard_0:0 "$gc_tera$Hyperquasaric Megashipyard Site"
  hyperquasaric_megashipyard_0_DESC:0 "This construction site will act as the staging ground for the largest and most powerful shipbuilding facility in our corner of the universe."
  hyperquasaric_megashipyard_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_terastructure$ - $giga_list_category_ship_production$ §H(250 Shipyards)§!\nUses a §MHyperquasar§! to assemble §YShips§!, produce £minerals£ §YMinerals§!, §YNaval Capacity§! and §YShip Build Speed§! - $giga_list_removes_system_planets$ - $giga_list_category_requires_starbase_uplink$\n§LA facility capable of both creating and managing entire galaxy spanning armadas.§!"
  
  hyperquasaric_megashipyard_1:0 "Hyperquasaric Megashipyard Accretion Harvester"
  hyperquasaric_megashipyard_1_DESC:0 "Employing immensely powerful magnetic fields to reshape the accretion disk below, the Accretion Harvester exists to gather raw materials and transport them to the not yet built Purification Ring for further refinement."
  
  hyperquasaric_megashipyard_2:0 "Hyperquasaric Megashipyard Purification Ring"
  hyperquasaric_megashipyard_2_DESC:0 "The Purification Ring takes the raw materials gathered by the Accretion Harvester and refines it into usable minerals, a large portion of which is used purely to maintain the structure. While not appearing to be physically connected to the Accretion Harvester, the Purification Ring is anchored to the structure in a higher dimension through the use of tetradimensional engineering."
  
  hyperquasaric_megashipyard_3:0 "Hyperquasaric Megashipyard Distribution Ring"
  hyperquasaric_megashipyard_3_DESC:0 "Acting as both structural and logistical support, the distribution ring manages the movement of materials and components throughout the structure as a whole."
  
  hyperquasaric_megashipyard_4:0 "Hyperquasaric Megashipyard"
  hyperquasaric_megashipyard_4_DESC:0 "An active Hyperquasaric Megashipyard, capable of both building and handling the logistics of a fleet larger than any ever built before."
  
  sm_quasarshipyard_shipyard_uplink:0 "Hyperquasaric Megashipyard Uplink"
  sm_quasarshipyard_shipyard_uplink_desc:0 "An uplink connecting the starbase to the hyperquasaric teraforge. Grants 250 shipyard slots and the ability to construct celestial warships."
  sm_quasarshipyard_shipyard_uplink_modifier:0 "Ship Modifier:$TABBED_NEW_LINE$ Ship Starting Experience: §G+250§! \nStarbase Modifier:$TABBED_NEW_LINE$Shipyard Capacity: §G+250§!$TABBED_NEW_LINE$Ship Build Speed: §G+250%§!\nShipyards: §YCelestial Warship Construction Enabled§!"
  
  
  
  ##########################
  # Gargantuan Quasarcraft #
  ##########################
  
  quasarcraft_0:0 "$gc_tera$Quasarcraft Construction Site"
  quasarcraft_0_DESC:0 "This construction site will facilitate the construction of the largest instrument of war that the galaxy has ever seen.."
  quasarcraft_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_terastructure$ - $giga_list_category_weaponry$\nConverts an §YActive Hyperquasar§! into a terastructural warship several hundred AU in diameter. Fielding a hyperweapon known as the Endsinger, the $quasarmod_quasarcraft$ is capable of destroying entire star clusters."
  quasarcraft_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - The Quasarcraft is capable of destroying either singular §YPlanets§!, §YSolar Systems§! or entire §YStar Clusters§!. It is a roving hyperweapon of untold destruction, and your enemies might seek to disrupt it's construction process."
  
  quasarcraft_1:0 "Quasarcraft Superstructure"
  quasarcraft_1_DESC:0 "The core of the $quasarmod_quasarcraft$, housing all of the future warships most vital subsystems, matrioshka targeting arrays and Hyperquasar confinement systems."
  
  quasarcraft_2:0 "Quasarcraft Halo"
  quasarcraft_2_DESC:0 "The Quasarcrafts signature polar-equatorial ring, with integrated gravity manipulation arrays and transdimensional anchors, the halo will play the all-important role of the weapons foundation."
  
  quasarcraft_3:0 "Quasarcraft Weapon Systems"
  quasarcraft_3_DESC:0 "The incredible energy output of the Hyperquasar allows for the utilization of weapons several orders of magnitude more powerful than those found on a typical systemcraft, all we need to do is build them."
  
  quasarcraft_4:0 "The $quasarmod_quasarcraft$"
  quasarcraft_4_DESC:0 "The now completed Quasarcraft, ready to purge all that is evil from the universe."
  
  # QSO Upgrade Version
  quasarcraft_1_alt:0 "$quasarcraft_2$"
  quasarcraft_1_alt_DESC:0 "The Quasarcrafts signature polar-equatorial ring, supported by the modified frame of the $quasi_stellar_obliterator_5$"
  
  quasarcraft_2_alt:0 "$quasarcraft_3$"
  quasarcraft_2_alt_DESC:0 "The quasaric energy that would have once been solely used for destruction on an interstellar scale will be redirected throughout the Quasarcraft itself, transforming the $quasi_stellar_obliterator_5$ into the ultimate mobile weapons platform."
  
  quasarcraft_3_alt:0 "$quasarcraft_4$"
  quasarcraft_3_alt_DESC:0 "The now completed Quasarcraft, ready to purge all that is evil from the universe."
  
  decision_quasarcraft_crew:0 "Acquire Quasarcraft Crew"
  decision_quasarcraft_crew_desc:0 "Extract 6000 pops from this world to serve as the Quasarcraft's crew."
  