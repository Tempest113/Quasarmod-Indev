l_spanish:
  
  ###########################
  # Hyperquasaric Teraforge #
  ###########################
  
  ## Megastructure ##
  hyperquasaric_teraforge_0:0 "$gc_tera$Hyperquasaric Teraforge Site"
  hyperquasaric_teraforge_0_DESC:0 "This construction site will act as the staging ground for the largest source of alloys and ships in galactic history."
  hyperquasaric_teraforge_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_terastructure$ - $giga_list_category_advanced_resource_production$ \nUses a §MHyperquasar§! to forge £minerals£ §Y$minerals$§! into £alloys£ §Y$alloys$§! and increases overall §YAlloy Production§! - $giga_list_removes_system_planets$\n§LA massive forge built around a Hyperquasar, utilizing its energies to produce alloys.§!"
  
  hyperquasaric_teraforge_1:0 "Hyperquasaric Teraforge Inner Ring"
  hyperquasaric_teraforge_1_DESC:0 "This gargantuan ring will act serve as the foundation for the rest of the structure to be built upon, as well as generating a magnetic field powerful enough to protect the terastructure from the accretion disk of the quasar which it encircles." #quasars accretion disk which can reach temperatures exceeding 1 billion kelvin.
  
  hyperquasaric_teraforge_2:0 "Hyperquasaric Teraforge Mass Collectors"
  hyperquasaric_teraforge_2_DESC:0 "Employing advanced gravitational manipulation technology, these structures extract raw materials from the quasar. Their sole purpose is to supply the alloy processors with the essential materials used in alloy production."
  
  hyperquasaric_teraforge_3:0 "Hyperquasaric Teraforge Alloy Processing"
  hyperquasaric_teraforge_3_DESC:0 "Within the teraforges alloy processing arrays, advanced nanoforges and fusion smelters transform raw minerals captured from the hyperquasar into pristine, ultra-dense neutronium alloys, harnessing the quasar's energy to forge alloys of a higher quality than anywhere else in the galaxy."
  
  hyperquasaric_teraforge_4:0 "Hyperquasaric Teraforge"
  hyperquasaric_teraforge_4_DESC:0 "An active Hyperquasaric Teraforge. Its immensely powerful mass harvesters siphon incredible amounts of raw materials from the quasar, providing the material required to forge an amount of alloys so large that we could construct entire planets out of pure neutronium if we so choose."
  
  ## Buildings ##
  building_teraforge_uplink_alloys:0 "Hyperquasaric Teraforge Integration Complex"
  building_teraforge_uplink_alloys_plural:0 "Hyperquasaric Teraforge Integration Complexes"
  building_teraforge_uplink_alloys_desc:0 "Specialist overseers coordinate the integration of alloy precursors processed by the Hyperquasaric Teraforge, the mitigation of bottlenecks and the reduction in tooling complexity allow for great improvements to be made in planetside alloy processing."
  building_teraforge_uplink_alloys_triggered_desc:0 "\n§G+1§! £mod_job_teraforge_overseer_alloys_add£['concept_job_teraforge_overseer_alloys'] per 100 £job_foundry£ §Y[GetAlloyProducerPlural]§!"
  building_teraforge_uplink_alloys_triggered_desc_catalytic:0 "\n§G+1§! £mod_job_teraforge_overseer_alloys_add£['concept_job_teraforge_overseer_alloys_catalytic'] per 100 £job_foundry£ §Y[GetAlloyProducerPlural]§!"
  building_teraforge_uplink_alloys_triggered_desc_gestalt:0 "\n§G+1§! £mod_job_teraforge_overseer_alloys_gestalt_add£['concept_job_teraforge_overseer_alloys_gestalt'] per 100 £job_foundry£ §Y[GetAlloyProducerPlural]§!"
  building_teraforge_uplink_alloys_triggered_desc_gestalt_catalytic:0 "\n§G+1§! £mod_job_teraforge_overseer_alloys_gestalt_add£['concept_job_teraforge_overseer_alloys_gestalt_catalytic'] per 100 £job_foundry£ §Y[GetAlloyProducerPlural]§!"
  
  building_teraforge_uplink_consumer_goods:0 "Teraforge-Aligned Civilian Design Centers"
  building_teraforge_uplink_consumer_goods_plural:0 "Teraforge-Aligned Civilian Design Centers"
  building_teraforge_uplink_consumer_goods_desc:0 "By integrating civilian product designs with a limited set of Hyperquasaric Teraforge compatible material standards, manufacturers can reduce tooling complexity and eliminate redundant manufacturing methods, increasing efficiency across the board."
  building_teraforge_uplink_consumer_goods_triggered_desc:0 "\n§G+1§! £mod_job_teraforge_overseer_consumer_goods_add£['concept_job_teraforge_overseer_consumer_goods'] per 100 [GetArtisanIcon] §Y[GetArtisanPlural]§!"
  building_teraforge_uplink_consumer_goods_triggered_desc_gestalt:0 "\n§G+1§! £mod_job_teraforge_overseer_consumer_goods_gestalt_add£['concept_job_teraforge_overseer_consumer_goods_gestalt'] per 100 [GetArtisanIcon] §Y[GetArtisanPlural]§!"
  
  ## Jobs ##
  
  # Alloys - Regular #
  job_teraforge_overseer_alloys:0 "Teraforge Integration Overseer"
  job_teraforge_overseer_alloys_plural:0 "Teraforge Integration Overseers"
  job_teraforge_overseer_alloys_plural_with_icon:0 "[teraforge_overseer_alloys.GetIcon] [teraforge_overseer_alloys.GetNamePlural]"
  job_teraforge_overseer_alloys_desc:0 "Specialists responsible for the integration of Teraforge-derived alloy precursors into planetary foundries, ensuring production lines operate at peak efficiency."
  job_teraforge_overseer_alloys_effect_desc:0 "[teraforge_overseer_alloys.GetIcon] [teraforge_overseer_alloys.GetNamePlural] turn £trade£ §Y$trade$§! into £mod_pop_bonus_workforce_mult£ §Y$mod_pop_foundry_bonus_workforce_mult$§!"
  mod_job_teraforge_overseer_alloys_add:0 "[teraforge_overseer_alloys.GetName] Jobs"
  
  # Alloys - Regular - Catalytic #
  job_teraforge_overseer_alloys_catalytic:0 "Teraforge Catalytic Integration Overseer"
  job_teraforge_overseer_alloys_catalytic_plural:0 "Teraforge Catalytic Integration Overseers"
  job_teraforge_overseer_alloys_catalytic_plural_with_icon:0 "[teraforge_overseer_alloys.GetIcon] [teraforge_overseer_alloys.GetNamePlural]"
  job_teraforge_overseer_alloys_catalytic_desc:0 "Specialists responsible for the integration of Teraforge-derived organic alloy precursors into planetary foundries, ensuring production lines operate at peak efficiency."
  job_teraforge_overseer_alloys_catalytic_effect_desc:0 "[teraforge_overseer_alloys.GetIcon] [teraforge_overseer_alloys.GetNamePlural] turn £trade£ §Y$trade$§! into £mod_pop_bonus_workforce_mult£ §Y$mod_pop_foundry_bonus_workforce_mult$§!"
  mod_job_teraforge_overseer_alloys_catalytic_add:0 "[teraforge_overseer_alloys.GetName] Jobs"
  
